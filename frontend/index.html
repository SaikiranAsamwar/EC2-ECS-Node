<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Delivery Dashboard</title>
  <meta name="description" content="Track and manage DevOps projects with a modern dashboard.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="bg-shape shape-a" aria-hidden="true"></div>
<div class="bg-shape shape-b" aria-hidden="true"></div>

<main class="container">
  <header class="hero">
    <p class="eyebrow">Engineering Ops</p>
    <h1>DevOps Delivery Dashboard</h1>
    <p class="subtitle">Plan, track, and ship projects with clear status visibility.</p>
  </header>

  <section class="stats" aria-label="Project statistics">
    <article class="stat-card">
      <p>Total Projects</p>
      <h2 id="totalCount">0</h2>
    </article>
    <article class="stat-card success">
      <p>Completed</p>
      <h2 id="completedCount">0</h2>
    </article>
    <article class="stat-card warning">
      <p>In Progress</p>
      <h2 id="inProgressCount">0</h2>
    </article>
  </section>

  <section class="panel" aria-label="Add project">
    <h3>Add New Project</h3>
    <form id="projectForm" class="form-grid">
      <div class="field">
        <label for="name">Project Name</label>
        <input id="name" name="name" placeholder="ex: ECS Migration" required>
      </div>

      <div class="field">
        <label for="tech">Tech Stack</label>
        <input id="tech" name="tech" placeholder="ex: Node.js, MongoDB, Docker" required>
      </div>

      <div class="field">
        <label for="status">Status</label>
        <select id="status" name="status" title="Project Status">
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>

      <button type="submit" class="primary">Create Project</button>
    </form>
  </section>

  <section class="panel" aria-label="Project filters and list">
    <div class="toolbar">
      <div class="field grow">
        <label for="search">Search</label>
        <input id="search" placeholder="Search by project name or tech stack">
      </div>

      <div class="field">
        <label for="filterStatus">Filter</label>
        <select id="filterStatus" title="Filter by status">
          <option value="All">All</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>

      <div class="field">
        <label for="sortBy">Sort</label>
        <select id="sortBy" title="Sort projects">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>

    <output id="message" class="message" aria-live="polite"></output>
    <div id="projects" class="projects"></div>

    <div class="pagination">
      <button type="button" id="prevPage" class="ghost">Previous</button>
      <span id="pageInfo" class="page-info">Page 1 of 1</span>
      <button type="button" id="nextPage" class="ghost">Next</button>
    </div>
  </section>
</main>

<dialog id="editDialog">
  <form id="editForm" method="dialog" class="dialog-form">
    <h3>Edit Project</h3>
    <input type="hidden" id="editId">

    <label for="editName">Project Name</label>
    <input id="editName" required>

    <label for="editTech">Tech Stack</label>
    <input id="editTech" required>

    <label for="editStatus">Status</label>
    <select id="editStatus" title="Edit project status">
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>

    <div class="dialog-actions">
      <button type="button" id="cancelEdit" class="ghost">Cancel</button>
      <button type="submit" class="primary">Save Changes</button>
    </div>
  </form>
</dialog>

<script type="module" src="script.js"></script>

</body>
</html>
